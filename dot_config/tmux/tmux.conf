# Remap prefix from 'C-b' to 'C-a'
# unbind C-b
# set-option -g prefix C-a
# bind-key C-a send-prefix

# Display
set -g base-index 1
set -g pane-base-index 1
set -g automatic-rename on
set -g renumber-windows on
set -g set-titles on
set -g mode-keys vi
set -g escape-time 0

# Split Panes 
unbind '"'
unbind %
bind i split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Switch Panes 
bind h select-pane -L
bind l select-pane -R
bind j select-pane -U
bind k select-pane -D

# Pane Resize 
unbind Left
unbind Right
unbind Up
unbind Down
bind -r Up    resize-pane -U 5
bind -r Down  resize-pane -D 5
bind -r Left  resize-pane -L 5
bind -r Right resize-pane -R 5
set -g repeat-time 500

# Pane Border Styles
set -g @border-fg "#a89984"
set -g pane-active-border-style bg=default,'fg=#{@border-fg}'
set -g pane-border-style 'fg=#{@border-fg}'

# Pane Background Styles
set -g @inactive-window-bg "#ECEAE6"
set -g @active-window-bg "#F0EFEC"
set -g window-style 'bg=#{@inactive-window-bg}'
set -g window-active-style 'bg=#{@active-window-bg}'

# Bottom Status Bar 
set -g @status-bg "#D4D4D4"
set -g @status-fg "#3c3836"
set -g status-style "bg=#{@status-bg},fg=#{@status-fg}"
set -g status-justify centre 
set -g status-left-length 50

# Session Segment
set -g @status-prefix-session-style 'bg=#86DE57,fg=#000000,bold'
set -g @status-no-prefix-session-style 'bg=#9EC26D,fg=#000000,bold'
set -g status-left '#{?client_prefix,#[#{E:@status-prefix-session-style}] ^#S #[default],#[#{E:@status-no-prefix-session-style}] #S #[default]}'
set -g status-right ""

# Following taken from https://github.com/semi710/minimal-tmux-status/tree/main
set -g @rarrow "¯é┤"
set -g @larrow "¯éÂ"
set -g @expanded-icon "¾░èô "
set -g @window-status-content ' #I:#{?#{m:ssh*,#{pane_current_command}},#(ps -t #{pane_tty} -o args= | grep "^ssh " | sed "s/.* //"),#W} '
set -g @zoom-icon '#{?window_zoomed_flag,#{@expanded-icon},}'

# Inactive Window Segment
set -g @window-status-inactive-body-style '#[bg=#{@status-bg},fg=#{@status-fg}]'
set -g @window-status-inactive-body '#{E:@window-status-content}'
set -g window-status-format \
'#{E:@window-status-inactive-body-style}#{E:@window-status-inactive-body}#{E:@zoom-icon}'

# Active Window Segment
set -g @status-current-window-bg "#458588"
set -g @larrow-current-style '#[fg=#{@status-current-window-bg}]#{@larrow}'
set -g @window-status-current-body-style '#[bg=#{@status-current-window-bg},fg=#{@status-bg},bold]'
set -g @window-status-current-body '#{E:@window-status-content}'
set -g @rarrow-current-style '#[fg=#{@status-current-window-bg},bg=default]#{@rarrow}'
set -g window-status-current-format \
'#{E:@larrow-current-style}#{E:@window-status-current-body-style}#{E:@window-status-current-body}#{E:@zoom-icon}#{E:@rarrow-current-style}'

# Reload Config File 
bind r source-file ~/.config/tmux/tmux.conf

# Mouse Mode
bind m set-option -g mouse \; display-message "Mouse #{?mouse,on,off}"

# Tmux-sessionizer
# unbind z
# https://github.com/ThePrimeagen/tmux-sessionizer
# bind z run-shell "tmux neww ~/.local/bin/tmux-sessionizer"
# https://github.com/joshmedeski/sesh
bind z run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 90%,80% \
    --no-sort --ansi --border-label ' sesh ' --prompt 'ÔØ» ' \
    --header '  A(ll) | (T)mux | (G) Configs | Zo(X)ide | (D) kill | (F)ind'  \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(ÔØ» )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(¯»ê )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(´Éú )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(¯ù┐ )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(´Çé )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(ÔØ» )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

# Maximize Pane 
bind + resize-pane -Z

# Create new window 
# bind c command-prompt -p "Window name:" "new-window -c '#{pane_current_path}' -n '%%'"

# Window Management
bind W run-shell "sesh window \"$(sesh window | fzf-tmux -p 60%,50% --prompt 'ÔØ» ')\""
