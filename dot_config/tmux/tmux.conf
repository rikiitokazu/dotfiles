# Remap prefix from 'C-b' to 'C-a'
# unbind C-b
# set-option -g prefix C-a
# bind-key C-a send-prefix

source-file ~/.config/tmux/colors.conf

# Display
set -g base-index 1
set -g pane-base-index 1
set -g automatic-rename on
set -g renumber-windows on
set -g set-titles on
set -g mode-keys vi
set -g escape-time 0

# Split Panes 
unbind '"'
unbind %
bind i split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Switch Panes 
bind h select-pane -L
bind l select-pane -R
bind j select-pane -U
bind k select-pane -D

# Pane Resize 
unbind Left
unbind Right
unbind Up
unbind Down
bind -r Up    resize-pane -U 5
bind -r Down  resize-pane -D 5
bind -r Left  resize-pane -L 5
bind -r Right resize-pane -R 5
set -g repeat-time 500

# Pane Border Styles
set -g pane-active-border-style bg=default,'fg=#{@border-fg}'
set -g pane-border-style 'fg=#{@border-fg}'

# Pane Background Styles
set -g window-style 'bg=#{@inactive-window-bg}'
set -g window-active-style 'bg=#{@active-window-bg}'

# Bottom Status Bar 
set -g status-style "bg=#{@status-bg},fg=#{@status-fg}"
set -g status-justify left
set -g status-left-length 50
# the extra styling on the right is for an extra space
set -g status-left "#[bg=#{@status-session-bg},fg=#{@status-bg},bold] #S #[bg=#{@status-bg},fg=#{@status-fg}] "
set -g status-right ""
set -g window-status-format \
"#[bg=#{@status-bg},fg=#{@inactive-window-fg}] #I:#W "
set -g window-status-current-format \
"#[bg=#{@status-current-window-bg},fg=#{@status-bg},bold] #I:#W "

# Reload Config File 
bind r source-file ~/.config/tmux/tmux.conf

# Mouse Mode
bind m set-option -g mouse \; display-message "Mouse #{?mouse,on,off}"

# Tmux-sessionizer (https://github.com/ThePrimeagen/tmux-sessionizer)
# unbind z
# bind z run-shell "tmux neww ~/.local/bin/tmux-sessionizer"
bind z run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 90%,80% \
    --no-sort --ansi --border-label ' sesh ' --prompt '❯ ' \
    --header '  A(ll) | (T)mux | (G) Configs | Zo(X)ide | (D) kill | (F)ind' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(❯ )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt()+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt()+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt()reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt()reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

# Maximize Pane 
bind + resize-pane -Z

# Create new window 
bind c command-prompt -p "Window name:" "new-window -c '#{pane_current_path}' -n '%%'"
